# Engine settings (non-secret). Secrets live in .env. See signal_engine/config.py.

market:
  timezone: "Asia/Kolkata"
  pre_open_start: "09:00"
  session_open: "09:15"
  no_new_entry_after: "15:00"   # stop generating new entry signals
  square_off: "15:20"           # force-close all paper positions
  session_close: "15:30"

# Live paper-trading watchlist — a DIVERSIFIED intraday test basket (the live feed subscribes
# to these and the engine paper-trades signals on them intraday). Selected from the real archive
# by recent turnover (liquidity / MIS-leverage = "high margin") + intraday range (mover-ness),
# mixed across SECTORS, CAP sizes (mega-caps + low-priced/penny high-volume names), and HIGH
# MOVERS. 40 names — comfortably within Dhan's WS caps. NOTE: this is a mechanics test of the
# de-clustered targets / ranked alerts / sizing / daily-loss breaker across a diverse universe;
# the base strategy has NO proven edge (see docs/SIGNAL_RESEARCH_FINDINGS.md) so PF<1 is expected
# — paper only.
watchlist:
  # Mega-cap anchors (high turnover, high leverage) — sector-spread
  - "RELIANCE"      # energy / conglomerate
  - "HDFCBANK"      # private bank (highest turnover)
  - "ICICIBANK"     # private bank
  - "SBIN"          # PSU bank
  - "AXISBANK"      # private bank
  - "BHARTIARTL"    # telecom
  - "INFY"          # IT
  - "TCS"           # IT
  - "LT"            # infra / capital goods
  - "MARUTI"        # auto (4-wheeler)
  - "M&M"           # auto / farm
  - "NTPC"          # power utility
  # Financials — large + high-mover NBFCs
  - "BAJFINANCE"    # NBFC (big + mover)
  - "SHRIRAMFIN"    # NBFC (high mover ~4.9%)
  # Pharma
  - "SUNPHARMA"     # pharma
  - "DRREDDY"       # pharma
  # Metals — large + LOW-PRICED movers
  - "TATASTEEL"     # metal (low-priced ~190)
  - "HINDALCO"      # metal
  - "SAIL"          # PSU metal (low-priced ~171, big mover ~5.3%)
  - "NMDC"          # mining (low-priced ~86)
  # High movers / new-age / high-beta
  - "TRENT"         # retail (top mover ~5.2% + very liquid)
  - "DIXON"         # EMS (high mover)
  - "ADANIENT"      # high-beta
  - "ETERNAL"       # food-tech (ex-Zomato)
  # Defence / PSU movers
  - "HAL"           # defence (mover ~4.3%)
  - "BEL"           # defence (low-priced ~413)
  # Low-priced / penny high-volume retail favourites
  - "IRFC"          # PSU rail financier (low-priced ~92, huge retail volume)
  - "SUZLON"        # renewables (low-priced ~58, retail mover)
  - "IDEA"          # telecom (penny ~14, high volume)
  - "YESBANK"       # bank (penny ~25, high volume)
  # High-MOVEMENT additions (Dhan scrip-master verified + archive-verified; ranked by recent
  # intraday range% with adequate turnover) — defence / EMS / new-age / EV themes.
  - "NETWEB"        # IT hardware & servers (mover ~3.4%, ~538cr) — requested
  - "HONASA"        # FMCG / new-age, Mamaearth (top mover ~6.3%)
  - "ZENTEC"        # defence tech, Zen Technologies (top mover ~6.0%)
  - "HFCL"          # telecom equipment (low-priced ~207, mover ~5.8%)
  - "BDL"           # defence, Bharat Dynamics (mover ~4.6%)
  - "KAYNES"        # electronics manufacturing / EMS (mover ~4.1%)
  - "PPLPHARMA"     # pharma, Piramal Pharma (low-priced ~172, mover ~4.1%)
  - "OLAELEC"       # EV, Ola Electric (low-priced ~43, high retail mover)
  - "SWIGGY"        # new-age food delivery (liquid ~598cr)
  - "GMRAIRPORT"    # airport infra (low-priced ~108, liquid ~568cr)

ingestion:
  base_timeframe_minutes: 1
  rollup_timeframes: [5, 15]

strategy:
  active: "vwap_ema_adx"
  params:
    ema_fast: 9
    ema_slow: 21
    rsi_period: 14
    adx_period: 14
    # BALANCED MODE (2026-06-25 EOD, post-analysis). Activity mode (conf 62 / adx 20 / rvol 1.2)
    # fired 41 trades and lost −4.5% — confidence proved NON-PREDICTIVE (the 90-100 band beat the
    # 75-89 band), so these gates are conservative DEFAULTS, explicitly NOT credited with selecting
    # quality (see docs/EOD_ANALYSIS_2026-06-25.md). They fire fewer trades (less cost-wall bleed)
    # while max_trades_per_day=15 still leaves visible activity. The base strategy has NO proven
    # edge — paper only. The real loss-reduction lever (suppress counter-regime longs) is being
    # built shadow/log-only, not gated live, until validated across many sessions.
    adx_min: 25            # conservative default (unproven; log adx/rvol to test, don't credit)
    adx_hard_floor: 20     # below this, no trade at all
    atr_period: 14
    rvol_lookback: 20
    rvol_min: 1.3          # conservative default (unproven)
    confidence_threshold: 75   # sane default ONLY — non-predictive, not a quality lever
    opening_range_minutes: 15
